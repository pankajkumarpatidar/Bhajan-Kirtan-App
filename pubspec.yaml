name: kirtan_app
description: "Kirtan App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.1
  firebase_storage: ^13.0.1

  # State Management
  provider: ^6.1.5

  # Fonts
  google_fonts: ^6.3.1

  # Images
  cached_network_image: ^3.4.1
  image_picker: ^1.2.0

  # Audio
  just_audio: ^0.10.4
  audio_session: ^0.2.2
  audio_service: ^0.18.18
  just_audio_background: ^0.0.1-beta.17

  # Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Network
  http: ^1.5.0
  connectivity_plus: ^7.0.0

  # Share
  share_plus: ^11.1.0

  # Authentication
  google_sign_in: ^7.2.0

  # Navigation
  go_router: ^16.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/
    - assets/data/